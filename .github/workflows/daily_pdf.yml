name: Scheduled HKO PDF Backup
on:
  schedule:
    # 每天在 UTC 03:01, 07:01, 11:01 執行
    # 對應香港時間 (HKT) 為 11:01, 15:01, 19:01
    - cron: '01 3,7,11 * * *'
  workflow_dispatch:
    
concurrency:
  group: hko-backup
  cancel-in-progress: false

jobs:
  capture_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Capture Script
        run: python capture.py

      - name: Save to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 確保在提交前先同步遠端狀態
          git pull origin main --rebase
          
          git add *.pdf
          git commit -m "HKO Backup: $(date -d '+8 hours' +'%Y-%m-%d %H:%M')" || exit 0
          
          # 使用循環重試機制推送，解決短時間內的競態衝突
          for i in {1..5}; do
            git push origin main && break || (git pull --rebase origin main && sleep 5)
          done
